<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة البطولة - مركز شباب تانيس</title>
    <link rel="stylesheet" href="knockout-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="nav-bar">
        <div class="nav-right">
            <a href="index.html" class="nav-btn btn-home">الرئيسية</a>
        </div>
        <div class="nav-center">
            <h1 class="page-title">🏆 شجرة البطولة - تانيس 🏆</h1>
        </div>
        <div class="nav-left">
            <a href="scorers.html" class="nav-btn btn-scorers">الهدافين</a>
        </div>
    </div>

    <div class="controls-bar">
        <button onclick="downloadBracket()" class="btn-action">⬇️ تحميل الشجرة كصورة</button>
        <button onclick="resetBracket()" class="btn-action" style="background: #dc3545;">🔄 إعادة تعيين الشجرة</button>
    </div>

    <div class="bracket-container" id="capture-area">
        <div class="bracket-side">
            <div class="bracket-column" id="r16-right"></div>
            <div class="bracket-column">
                <div class="match-card">
                    <div class="round-header">ربع النهائي 1</div>
                    <div class="team-slot"><span id="qf-0-s0">؟</span><div><input type="number" id="qf-0-p0" class="penalties-input i-qf-0"><input type="number" id="qf-0-g0" class="score-input" oninput="showPens('qf', 0)"></div></div>
                    <div class="team-slot"><span id="qf-0-s1">؟</span><div><input type="number" id="qf-0-p1" class="penalties-input i-qf-0"><input type="number" id="qf-0-g1" class="score-input" oninput="showPens('qf', 0)"></div></div>
                    <button onclick="processMatch('qf', 0)" class="win-btn"></button>
                </div>
                <div class="match-card">
                    <div class="round-header">ربع النهائي 2</div>
                    <div class="team-slot"><span id="qf-1-s0">؟</span><div><input type="number" id="qf-1-p0" class="penalties-input i-qf-1"><input type="number" id="qf-1-g0" class="score-input" oninput="showPens('qf', 1)"></div></div>
                    <div class="team-slot"><span id="qf-1-s1">؟</span><div><input type="number" id="qf-1-p1" class="penalties-input i-qf-1"><input type="number" id="qf-1-g1" class="score-input" oninput="showPens('qf', 1)"></div></div>
                    <button onclick="processMatch('qf', 1)" class="win-btn"></button>
                </div>
            </div>
            <div class="bracket-column">
                <div class="match-card gold-border">
                    <div class="round-header gold-bg">نصف النهائي 1</div>
                    <div class="team-slot"><span id="sf-0-s0">؟</span><div><input type="number" id="sf-0-p0" class="penalties-input i-sf-0"><input type="number" id="sf-0-g0" class="score-input" oninput="showPens('sf', 0)"></div></div>
                    <div class="team-slot"><span id="sf-0-s1">؟</span><div><input type="number" id="sf-0-p1" class="penalties-input i-sf-0"><input type="number" id="sf-0-g1" class="score-input" oninput="showPens('sf', 0)"></div></div>
                    <button onclick="processMatch('sf', 0)" class="win-btn"></button>
                </div>
            </div>
        </div>

        <div class="bracket-center">
            <h3 class="round-header gold-bg" style="width: 100%;">النهائي</h3>
            <div class="match-card gold-border">
                <div class="team-slot"><span id="final-s0">؟</span><div><input type="number" id="f-p0" class="penalties-input i-f-0"><input type="number" id="f-g0" class="score-input" oninput="showPens('f', 0)"></div></div>
                <div class="team-slot"><span id="final-s1">؟</span><div><input type="number" id="f-p1" class="penalties-input i-f-0"><input type="number" id="f-g1" class="score-input" oninput="showPens('f', 0)"></div></div>
                <button onclick="processFinal()" class="win-btn gold-bg"></button>
            </div>
            <div id="winner-name">البطل</div>
        </div>

        <div class="bracket-side side-left">
            <div class="bracket-column" id="r16-left"></div>
            <div class="bracket-column">
                <div class="match-card">
                    <div class="round-header">ربع النهائي 3</div>
                    <div class="team-slot"><span id="qf-2-s0">؟</span><div><input type="number" id="qf-2-p0" class="penalties-input i-qf-2"><input type="number" id="qf-2-g0" class="score-input" oninput="showPens('qf', 2)"></div></div>
                    <div class="team-slot"><span id="qf-2-s1">؟</span><div><input type="number" id="qf-2-p1" class="penalties-input i-qf-2"><input type="number" id="qf-2-g1" class="score-input" oninput="showPens('qf', 2)"></div></div>
                    <button onclick="processMatch('qf', 2)" class="win-btn"></button>
                </div>
                <div class="match-card">
                    <div class="round-header">ربع النهائي 4</div>
                    <div class="team-slot"><span id="qf-3-s0">؟</span><div><input type="number" id="qf-3-p0" class="penalties-input i-qf-3"><input type="number" id="qf-3-g0" class="score-input" oninput="showPens('qf', 3)"></div></div>
                    <div class="team-slot"><span id="qf-3-s1">؟</span><div><input type="number" id="qf-3-p1" class="penalties-input i-qf-3"><input type="number" id="qf-3-g1" class="score-input" oninput="showPens('qf', 3)"></div></div>
                    <button onclick="processMatch('qf', 3)" class="win-btn"></button>
                </div>
            </div>
            <div class="bracket-column">
                <div class="match-card gold-border">
                    <div class="round-header gold-bg">نصف النهائي 2</div>
                    <div class="team-slot"><span id="sf-1-s0">؟</span><div><input type="number" id="sf-1-p0" class="penalties-input i-sf-1"><input type="number" id="sf-1-g0" class="score-input" oninput="showPens('sf', 1)"></div></div>
                    <div class="team-slot"><span id="sf-1-s1">؟</span><div><input type="number" id="sf-1-p1" class="penalties-input i-sf-1"><input type="number" id="sf-1-g1" class="score-input" oninput="showPens('sf', 1)"></div></div>
                    <button onclick="processMatch('sf', 1)" class="win-btn"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- دالة تسجيل الأهداف مباشرة في الإحصائيات ---
     function recordGoalsDirectly(teamName, goalsCount) {
    let g = parseInt(goalsCount) || 0;
    if (g <= 0) return;

    // جلب بيانات البطولة
    let tournament = JSON.parse(localStorage.getItem("tournament")) || { groups: {} };
    let found = false;

    // البحث عن الفريق في المجموعات لزيادة أهدافه في الإحصائيات العامة (Dashboard)
    for (let group in tournament.groups) {
        let teamObj = tournament.groups[group].find(t => t.name.trim() === teamName.trim());
        if (teamObj) {
            teamObj.gf = (parseInt(teamObj.gf) || 0) + g;
            found = true;
            break; 
        }
    }

    // إذا وجدنا الفريق، نحفظ التعديل ليظهر في لوحة الإحصائيات فوراً
    if (found) {
        localStorage.setItem("tournament", JSON.stringify(tournament));
        console.log(`تم إضافة ${g} أهداف لفريق ${teamName} في الإحصائيات.`);
    }
}
        function saveState() {
            const state = { 
                names: {}, 
                scores: {}, 
                winner: document.getElementById("winner-name").innerText 
            };
            document.querySelectorAll('span[id]').forEach(el => state.names[el.id] = el.innerText);
            document.querySelectorAll('input').forEach(el => state.scores[el.id] = el.value);
            localStorage.setItem("tanis_bracket_data", JSON.stringify(state));
        }

        function loadState() {
            const data = JSON.parse(localStorage.getItem("tanis_bracket_data"));
            if(!data) return;
            for(let id in data.names) {
                if(document.getElementById(id)) document.getElementById(id).innerText = data.names[id];
            }
            for(let id in data.scores) {
                let el = document.getElementById(id);
                if(el) { 
                    el.value = data.scores[id]; 
                    let parts = id.split('-'); 
                    if(parts.length >= 2) showPens(parts[0], parts[1], false); 
                }
            }
            document.getElementById("winner-name").innerText = data.winner || "البطل";
        }

        function showPens(stage, i, shouldSave = true) {
            const g0 = document.getElementById(`${stage}-${i}-g0`)?.value;
            const g1 = document.getElementById(`${stage}-${i}-g1`)?.value;
            const pens = document.querySelectorAll(`.i-${stage}-${i}`);
            if(g0 !== "" && g1 !== "" && g0 === g1) {
                pens.forEach(p => p.style.display = "inline-block");
            } else {
                pens.forEach(p => p.style.display = "none");
            }
            if(shouldSave) saveState();
        }

        function getWinner(n1, n2, g1, g2, p1, p2) {
            const s1 = parseInt(g1) || 0, s2 = parseInt(g2) || 0;
            if (s1 > s2) return n1;
            if (s2 > s1) return n2;
            const pen1 = parseInt(p1) || 0, pen2 = parseInt(p2) || 0;
            return pen1 > pen2 ? n1 : n2;
        }

        function processR16(i, n1, n2) {
            const g0 = document.getElementById(`m16-${i}-g0`).value;
            const g1 = document.getElementById(`m16-${i}-g1`).value;
            if(g0 === "" || g1 === "") return alert("أدخل النتيجة أولاً");
            
            // تسجيل الهدافين
            recordGoalsDirectly(n1, g0);
            recordGoalsDirectly(n2, g1);

            const w = getWinner(n1, n2, g0, g1, 
                document.getElementById(`m16-${i}-p0`).value, 
                document.getElementById(`m16-${i}-p1`).value);
            
            document.getElementById(`qf-${Math.floor(i/2)}-s${i%2}`).innerText = w;
            saveState();
            alert("تم تسجيل الأهداف وصعود فريق: " + w);
        }

        function processMatch(stage, i) {
            const n0 = document.getElementById(`${stage}-${i}-s0`).innerText;
            const n1 = document.getElementById(`${stage}-${i}-s1`).innerText;
            const g0 = document.getElementById(`${stage}-${i}-g0`).value;
            const g1 = document.getElementById(`${stage}-${i}-g1`).value;
            if(n0 === "؟" || g0 === "" || g1 === "") return alert("البيانات غير مكتملة");
            
            // تسجيل الهدافين
            recordGoalsDirectly(n0, g0);
            recordGoalsDirectly(n1, g1);

            const w = getWinner(n0, n1, g0, g1, 
                document.getElementById(`${stage}-${i}-p0`).value, 
                document.getElementById(`${stage}-${i}-p1`).value);
            
            let targetId;
            if(stage === 'qf') {
                targetId = (i < 2) ? `sf-0-s${i%2}` : `sf-1-s${i%2}`;
            } else if(stage === 'sf') {
                targetId = `final-s${i}`;
            }
            
            if(document.getElementById(targetId)) document.getElementById(targetId).innerText = w;
            saveState();
            alert("تم تسجيل الأهداف وصعود فريق: " + w);
        }

        function processFinal() {
            const n0 = document.getElementById(`final-s0`).innerText;
            const n1 = document.getElementById(`final-s1`).innerText;
            const g0 = document.getElementById(`f-g0`).value;
            const g1 = document.getElementById(`f-g1`).value;
            if(g0 === "" || g1 === "") return alert("أدخل نتيجة النهائي");
            
            // تسجيل الهدافين
            recordGoalsDirectly(n0, g0);
            recordGoalsDirectly(n1, g1);

            const w = getWinner(n0, n1, g0, g1, 
                document.getElementById(`f-p0`).value, 
                document.getElementById(`f-p1`).value);
                
            document.getElementById("winner-name").innerText = w;
            saveState();
            alert("تم تسجيل الأهداف، وبطل البطولة هو: " + w);
        }

        function renderKnockout() {
            const data = JSON.parse(localStorage.getItem("tournament"));
            if(!data) return;
            
            let q = {};
            ["A","B","C","D","E","F","G","H"].forEach(g => {
                let t = data.groups[g] || [];
                t.sort((a,b) => (b.points||0) - (a.points||0) || (b.gf-b.ga) - (a.gf-a.ga));
                q[g] = { first: t[0] || {name:`أول ${g}`}, second: t[1] || {name:`وصيف ${g}`} };
            });

            const r16Matches = [
                [q.A.first, q.C.second], [q.F.first, q.H.second], [q.G.first, q.E.second], [q.D.first, q.B.second],
                [q.B.first, q.D.second], [q.C.first, q.A.second], [q.E.first, q.G.second], [q.H.first, q.F.second]
            ];

            const r16R = document.getElementById("r16-right"), r16L = document.getElementById("r16-left");
            r16R.innerHTML = ""; r16L.innerHTML = "";

            r16Matches.forEach((m, i) => {
                let html = `
                <div class="match-card">
                    <div class="round-header">دور الـ 16</div>
                    <div class="team-slot"><span>${m[0].name}</span><div><input type="number" id="m16-${i}-p0" class="penalties-input i-m16-${i}"><input type="number" id="m16-${i}-g0" class="score-input" oninput="showPens('m16', ${i})"></div></div>
                    <div class="team-slot"><span>${m[1].name}</span><div><input type="number" id="m16-${i}-p1" class="penalties-input i-m16-${i}"><input type="number" id="m16-${i}-g1" class="score-input" oninput="showPens('m16', ${i})"></div></div>
                    <button onclick="processR16(${i}, '${m[0].name}', '${m[1].name}')" class="win-btn"></button>
                </div>`;
                if(i < 4) r16R.innerHTML += html; else r16L.innerHTML += html;
            });
            
            loadState(); 
        }

        function downloadBracket() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { backgroundColor: "#000", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'bracket-tanis.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function resetBracket() {
            if(confirm("سيتم تصفير شجرة الأدوار الإقصائية فقط، هل أنت متأكد؟")) {
                localStorage.removeItem("tanis_bracket_data");
                location.reload();
            }
        }

        window.onload = renderKnockout;
    </script>
</body>
</html>
