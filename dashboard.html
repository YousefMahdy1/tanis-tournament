<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإحصائيات - مركز شباب تانيس</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .stat-card { background: linear-gradient(145deg, #b30000, #7a0000); padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 1px solid #ffd700; transition: transform 0.3s; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { margin: 0; font-size: 1.1rem; color: #ffd700; }
        .stat-card p { font-size: 2.2rem; margin: 10px 0 0 0; font-weight: bold; color: white; }
        .recent-matches { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .recent-table { width: 100%; background: rgba(255, 255, 255, 0.05); border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        .recent-table th { background: #ffd700; color: black; padding: 10px; }
        .recent-table td { padding: 12px; border-bottom: 1px solid #444; text-align: center; color: white; }
    </style>
</head>
<body>

    <nav class="navbar" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;">
        <div>
            <a href="index.html" class="nav-btn">الرئيسية</a>
            <a href="knockout.html" class="nav-btn" style="background: #28a745; color: white;">شجرة الإقصائيات</a>
        </div>
        <div class="logo-container">
            <span class="logo-text">مركز شباب تانيس</span>
            <img src="logo.png" alt="Logo" style="height: 50px;">
        </div>
    </nav>

    <h1 class="title">إحصائيات البطولة الرمضانية 📊</h1>

    <div class="stats">
        <div class="stat-card"><h3>إجمالي المباريات</h3><p id="matchesCount">0</p></div>
        <div class="stat-card"><h3>إجمالي الأهداف</h3><p id="goalsCount">0</p></div>
        <div class="stat-card"><h3>الفرق المشاركة</h3><p id="teamsCount">0</p></div>
        <div class="stat-card"><h3>هداف البطولة 🏆</h3><p id="topScorer" style="font-size: 1.4rem; color: #ffd700;">-</p></div>
    </div>

    <div class="recent-matches">
        <h2 style="color: #ffd700; border-bottom: 2px solid #ffd700; padding-bottom: 10px;">آخر النتائج المسجلة ⚽</h2>
        <table class="recent-table">
            <thead><tr><th>المباراة</th><th>النتيجة</th><th>المرحلة</th></tr></thead>
            <tbody id="recentMatchesBody"></tbody>
        </table>
    </div>

    <script>
        function refreshDashboard() {
            let matchesLog = JSON.parse(localStorage.getItem("matches")) || [];
            let scorers = JSON.parse(localStorage.getItem("scorers")) || [];
            let tournament = JSON.parse(localStorage.getItem("tournament")) || { groups: {} };

            let totalGoalsFromGroups = 0, totalTeams = 0;

            // 1. حساب أهداف المجموعات
            for (let groupName in tournament.groups) {
                let teams = tournament.groups[groupName];
                totalTeams += teams.length;
                teams.forEach(team => { totalGoalsFromGroups += (team.gf || 0); });
            }

            // 2. حساب أهداف الإقصائيات من السجل العام (المباريات التي لم تحسب في المجموعات)
            let knockoutGoals = 0;
            matchesLog.forEach(m => {
                if (m.group === "أدوار إقصائية") {
                    knockoutGoals += (parseInt(m.homeGoals) || 0) + (parseInt(m.awayGoals) || 0);
                }
            });

            // 3. التحديث
            document.getElementById("matchesCount").innerText = matchesLog.length;
            document.getElementById("goalsCount").innerText = totalGoalsFromGroups + knockoutGoals;
            document.getElementById("teamsCount").innerText = totalTeams;

            // الهداف
            if (scorers.length > 0) {
                let sorted = [...scorers].sort((a, b) => b.goals - a.goals);
                document.getElementById("topScorer").innerText = `${sorted[0].name} (${sorted[0].goals})`;
            }

            // جدول النتائج
            const recentBody = document.getElementById("recentMatchesBody");
            recentBody.innerHTML = "";
            matchesLog.slice(-5).reverse().forEach(m => {
                recentBody.innerHTML += `<tr><td>${m.home} vs ${m.away}</td><td style="font-weight: bold; color: #ffd700;">${m.homeGoals} - ${m.awayGoals}</td><td style="color: #00ffcc;">${m.group || "مجموعات"}</td></tr>`;
            });
        }
        window.onload = refreshDashboard;
    </script>
</body>
</html>
